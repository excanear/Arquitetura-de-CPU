name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  contract:
    name: Contract Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run contract consistency tests
        run: python -m pytest tests/test_contract_consistency.py -q

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run CLI integration smoke tests
        run: python -m pytest tests/test_cli_integration.py -k "link_then_load_vinit or build_then_load_mem" -q

  test:
    name: Pytest — EduRISC-32v2
    runs-on: ubuntu-latest
    needs: [contract, cli-smoke]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Icarus Verilog
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run demo (smoke test)
        run: python main.py demo

      - name: Run RTL syntax smoke test
        run: python main.py rtl-build

      - name: Run RTL functional smoke test
        run: |
          python main.py assemble examples/soma_1_a_n.asm -o /tmp/rtl_smoke.hex
          python main.py rtl-sim /tmp/rtl_smoke.hex --timeout 45
